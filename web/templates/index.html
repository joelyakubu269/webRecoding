<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Page</title>
</head>
<body>
    {{if not .Result}}
    <form action="/ascii-art" method="post">
        <label for="fname">Enter Word </label><br>
        <textarea name="text" id="fname"></textarea><br><br>

        <select name="banner" id="banner">
            <option value="shadow">Shadow</option>
            <option value="standard">Standard</option>
            <option value="thinkertoy">Thinkertoy</option>
        </select>

        <input type="submit" value="Submit">
    </form>
    {{end}}

    {{if .Result}}
        <pre>{{.Result}}</pre>
        <a href="/ascii-art-switch?text={{.Text}}&banner=shadow" class="active">Shadow</a><br>
        <a href="/ascii-art-switch?text={{.Text}}&banner=standard" class="active">Standard</a><br>
        <a href="/ascii-art-switch?text={{.Text}}&banner=thinkertoy" class="active">Thinkertoy</a><br>
    {{end}}


</body>
</html>
